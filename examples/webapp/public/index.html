<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ran Todo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-top: 60px;
        }
        .container { width: 100%; max-width: 500px; padding: 0 20px; }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #667eea; }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        .todo-list { list-style: none; }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            background: #16213e;
            border-radius: 8px;
            border: 1px solid #333;
            transition: all 0.2s;
        }
        .todo-item:hover { border-color: #667eea; }
        .todo-item.done .todo-text {
            text-decoration: line-through;
            color: #666;
        }
        .todo-check {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid #667eea;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .todo-check.checked {
            background: #667eea;
        }
        .todo-check.checked::after {
            content: '✓';
            color: white;
            font-size: 12px;
        }
        .todo-text { flex: 1; }
        .todo-delete {
            cursor: pointer;
            color: #666;
            font-size: 1.2rem;
            padding: 0 4px;
        }
        .todo-delete:hover { color: #e74c3c; }
        .stats {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        .powered {
            text-align: center;
            color: #444;
            margin-top: 40px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ran Todo</h1>
        <p class="subtitle">Built with Ran Programming Language</p>

        <div class="input-row">
            <input type="text" id="input" placeholder="What needs to be done?" autofocus>
            <button onclick="addTodo()">Add</button>
        </div>

        <ul class="todo-list" id="list"></ul>
        <p class="stats" id="stats"></p>
        <p class="powered">Powered by Ran v0.1.0 — ran http.server</p>
    </div>

    <script>
        let todos = [];
        let nextId = 1;

        // Load initial todos from API
        fetch('/api/todos')
            .then(r => r.json())
            .then(data => {
                todos = data;
                nextId = todos.length + 1;
                render();
            })
            .catch(() => render());

        document.getElementById('input').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTodo();
        });

        function addTodo() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;
            todos.push({ id: nextId++, text, done: false });
            input.value = '';
            render();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) todo.done = !todo.done;
            render();
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            render();
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = todos.map(t => `
                <li class="todo-item ${t.done ? 'done' : ''}">
                    <div class="todo-check ${t.done ? 'checked' : ''}" onclick="toggleTodo(${t.id})"></div>
                    <span class="todo-text">${t.text}</span>
                    <span class="todo-delete" onclick="deleteTodo(${t.id})">×</span>
                </li>
            `).join('');

            const done = todos.filter(t => t.done).length;
            document.getElementById('stats').textContent =
                `${todos.length} tasks, ${done} completed`;
        }
    </script>
</body>
</html>
