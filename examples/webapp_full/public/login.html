<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Ran</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="center">
    <form class="card" id="form">
      <h1>Sign in</h1>
      <label for="u">Username</label>
      <input type="text" id="u" autocomplete="username" value="admin" />
      <label for="p">Password</label>
      <input type="password" id="p" autocomplete="current-password" value="admin123" />
      <button type="submit">Log in</button>
      <div class="err" id="err"></div>
      <p style="font-size:.8rem;color:#64748b">Try admin/admin123 or user/secret123</p>
    </form>
  </div>
  <script>
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("u").value;
      const password = document.getElementById("p").value;
      const res = await fetch("/login", {
        method: "POST",
        body: JSON.stringify({ username, password }),
      });
      if (res.ok) {
        location.href = "/dashboard";
      } else {
        document.getElementById("err").textContent = "Invalid username or password";
      }
    });
  </script>
</body>
</html>
